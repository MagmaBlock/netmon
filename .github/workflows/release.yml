name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dist/netmon-${GOOS}-${GOARCH}${ext}"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "$out" .
          # 压缩成 tar.gz（windows 用 zip）
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip "netmon-${GOOS}-${GOARCH}.zip" "netmon-${GOOS}-${GOARCH}${ext}")
          else
            tar -C dist -czf "dist/netmon-${GOOS}-${GOARCH}.tar.gz" "netmon-${GOOS}-${GOARCH}${ext}"
          fi
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netmon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/netmon-*.tar.gz
            dist/netmon-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip